<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="32" fill="#111827"/>

  <!-- Heart shape -->
  <path d="M32 50
    C32 50 10 36 10 22
    C10 15 15.5 10 22 10
    C26 10 29.5 12 32 15.5
    C34.5 12 38 10 42 10
    C48.5 10 54 15 54 22
    C54 36 32 50 32 50Z"
    fill="#ef4444" opacity="0.15"/>

  <!-- Heart outline -->
  <path d="M32 50
    C32 50 10 36 10 22
    C10 15 15.5 10 22 10
    C26 10 29.5 12 32 15.5
    C34.5 12 38 10 42 10
    C48.5 10 54 15 54 22
    C54 36 32 50 32 50Z"
    stroke="#ef4444" stroke-width="2" fill="none"/>

  <!-- ECG / pulse line across the heart -->
  <polyline
    points="13,30 20,30 23,23 26,37 29,27 31,33 33,28 36,33 39,30 51,30"
    stroke="#ef4444" stroke-width="2.2" fill="none"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>
